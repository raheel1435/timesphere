<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Hour markers -->
  <line x1="256" y1="46"  x2="256" y2="76"  stroke="white" stroke-width="8"  stroke-linecap="round"/>
  <line x1="256" y1="436" x2="256" y2="466" stroke="white" stroke-width="8"  stroke-linecap="round"/>
  <line x1="46"  y1="256" x2="76"  y2="256" stroke="white" stroke-width="8"  stroke-linecap="round"/>
  <line x1="436" y1="256" x2="466" y2="256" stroke="white" stroke-width="8"  stroke-linecap="round"/>
  <!-- Minor markers -->
  <line x1="366" y1="64"  x2="351" y2="90"  stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="448" y1="146" x2="422" y2="161" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="448" y1="366" x2="422" y2="351" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="366" y1="448" x2="351" y2="422" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="146" y1="64"  x2="161" y2="90"  stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="64"  y1="146" x2="90"  y2="161" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="64"  y1="366" x2="90"  y2="351" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="146" y1="448" x2="161" y2="422" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="256" y1="256" x2="175" y2="155" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="256" y1="256" x2="340" y2="140" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="256" y1="290" x2="256" y2="120" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="256" cy="256" r="14" fill="white"/>
  <circle cx="256" cy="256" r="7"  fill="#ef4444"/>
</svg>
